<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion - Gana Ousmane</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9;}
header{background:#1e3a8a;color:white;padding:15px;text-align:center;font-size:22px;font-weight:bold;}
.container{padding:15px;}
input{padding:8px;margin:5px 0;width:100%;border-radius:6px;border:1px solid #ccc;}
button{background:#fbbf24;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-weight:bold;margin:3px;}
button:hover{opacity:0.85;}
.card{background:white;padding:12px;border-radius:10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.photo{width:60px;height:60px;border-radius:50%;object-fit:cover;margin-right:10px;}
.info{display:flex;align-items:center;}
table{width:100%;border-collapse:collapse;background:white;margin-top:20px;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background:#1e3a8a;color:white;}
</style>
</head>

<body>

<header>Gestion - Gana Ousmane</header>

<div class="container">

<h3>Ajouter Employé</h3>
<input type="text" id="nom" placeholder="Nom">
<input type="number" id="salaire" placeholder="Salaire de base">
<input type="file" id="photoInput">
<button onclick="ajouterEmploye()">Ajouter</button>

<h3>Employés</h3>
<div id="liste"></div>

<h3>Gestion des Opérations</h3>
<button onclick="exportPDF()">Exporter PDF Global</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Employé</th>
<th>Type</th>
<th>Montant</th>
</tr>
</thead>
<tbody id="tableTransactions"></tbody>
</table>

</div>

<!-- MODAL HISTORIQUE -->
<div id="modalHistorique" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999;">
<div style="background:white;width:90%;max-width:600px;margin:40px auto;padding:15px;border-radius:10px;max-height:85%;overflow:auto;">
<h3 id="titreHistorique"></h3>

<input type="date" id="filtreDate">

<table border="1" width="100%" id="tableHist">
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Montant</th>
</tr>
</thead>
<tbody id="bodyHist"></tbody>
</table>

<p id="totalVersement"></p>
<p id="totalRetrait"></p>

<canvas id="chartHist" height="120"></canvas>

<br>
<button onclick="imprimerHistorique()">🖨 Imprimer</button>
<button onclick="exportPDFHistorique()">📄 PDF</button>
<button onclick="fermerHistorique()" style="background:red;color:white;">Fermer</button>
</div>
</div>

<script>

// — LocalStorage
let employes = JSON.parse(localStorage.getItem("employes")) || [];
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

// — Sauvegarder
function save(){
  localStorage.setItem("employes", JSON.stringify(employes));
  localStorage.setItem("transactions", JSON.stringify(transactions));
}

// — Ajouter employé
function ajouterEmploye(){
  let nom = document.getElementById("nom").value.trim();
  let salaire = parseInt(document.getElementById("salaire").value);
  let photoFile = document.getElementById("photoInput").files[0];

  if(!nom || !salaire || !photoFile){
    alert("Remplis tous les champs");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(){
    employes.push({
      id: Date.now(),
      nom,
      salaireBase:salaire,
      totalRecu:0,
      salaireRestant:salaire,
      photo:reader.result
    });
    save();
    afficherEmployes();
  }
  reader.readAsDataURL(photoFile);
}

// — Afficher Employés
function afficherEmployes(){
  let liste = document.getElementById("liste");
  liste.innerHTML = "";

  employes.forEach(emp => {
    liste.innerHTML += `
      <div class="card">
        <div class="info">
          <img src="${emp.photo}" class="photo">
          <div>
            <b>${emp.nom}</b><br>
            Salaire Base: ${emp.salaireBase} FCFA<br>
            Total Reçu: ${emp.totalRecu} FCFA<br>
            <b>Salaire Restant: ${emp.salaireRestant} FCFA</b>
          </div>
        </div>
        <div>
          <button onclick="retrait(${emp.id})">Retrait</button>
          <button onclick="versement(${emp.id})">Versement</button>
          <button onclick="carteEmploye(${emp.id})">Carte</button>
          <button onclick="historiqueEmploye(${emp.id})">Historique</button>
          <button onclick="supprimer(${emp.id})" style="background:red;color:white;">X</button>
        </div>
      </div>`;
  });

  afficherTransactions();
}

// — Retrait
function retrait(id){
  let montant = parseInt(prompt("Montant retrait"));
  let emp = employes.find(e => e.id === id);
  if(!montant || montant <= 0) return;
  if(montant > emp.salaireRestant){
    alert("Solde insuffisant");
    return;
  }
  emp.salaireRestant -= montant;
  transactions.push({date:new Date().toLocaleString(), nom:emp.nom, type:"Retrait", montant});
  save();
  afficherEmployes();
  genererRecu(emp,"Retrait",montant);
}

// — Versement
function versement(id){
  let montant = parseInt(prompt("Montant versement"));
  let emp = employes.find(e => e.id === id);
  if(!montant || montant <= 0) return;
  emp.totalRecu += montant;
  emp.salaireRestant += montant;
  transactions.push({date:new Date().toLocaleString(), nom:emp.nom, type:"Versement", montant});
  save();
  afficherEmployes();
  genererRecu(emp,"Versement",montant);
}

// — Supprimer
function supprimer(id){
  if(confirm("Supprimer cet employé ?")){
    employes = employes.filter(e => e.id !== id);
    save(); afficherEmployes();
  }
}

// — Afficher Transactions
function afficherTransactions(){
  let table = document.getElementById("tableTransactions");
  table.innerHTML = "";
  transactions.forEach(t => {
    table.innerHTML += `
      <tr><td>${t.date}</td><td>${t.nom}</td><td>${t.type}</td><td>${t.montant} FCFA</td></tr>
    `;
  });
}

// — Historique Employé
function historiqueEmploye(id){
let password=prompt("Mot de passe admin ?");
if(password!=="1234"){alert("Accès refusé");return;}
let emp=employes.find(e=>e.id===id);
let historique=transactions.filter(t=>t.nom===emp.nom);

document.getElementById("modalHistorique").style.display="block";
document.getElementById("titreHistorique").innerText="Historique - "+emp.nom;

let body=document.getElementById("bodyHist");
body.innerHTML="";

let totalRetrait=0;
let totalVersement=0;

historique.forEach(h=>{
if(h.type==="Retrait") totalRetrait+=h.montant;
if(h.type==="Versement") totalVersement+=h.montant;
body.innerHTML+= `<tr><td>${h.date}</td><td>${h.type}</td><td>${h.montant} FCFA</td></tr>`;
});

document.getElementById("totalVersement").innerHTML="<b>Total Versement:</b> "+totalVersement+" FCFA";
document.getElementById("totalRetrait").innerHTML="<b>Total Retrait:</b> "+totalRetrait+" FCFA";

new Chart(document.getElementById("chartHist"),{
type:'bar',
data:{labels:['Versement','Retrait'],datasets:[{label:'Montant FCFA',data:[totalVersement,totalRetrait]}]}
});
}

function fermerHistorique(){document.getElementById("modalHistorique").style.display="none";}
function imprimerHistorique(){window.print();}

function exportPDFHistorique(){const { jsPDF } = window.jspdf;const doc=new jsPDF();doc.text("Historique Employé",20,20);doc.save("Historique.pdf");}

// — Carte Employé
function carteEmploye(id){
let emp=employes.find(e=>e.id===id);
let fenetre=window.open('','width=500,height=700');
fenetre.document.write(`
<html><body style="font-family:Arial;text-align:center;">
<div style="width:350px;background:#1e3a8a;color:white;padding:15px;border-radius:10px;margin:auto;">
<h3>GANA OUSMANE</h3>
<img src="${emp.photo}" style="width:80px;height:80px;border-radius:50%;">
<p><b>${emp.nom}</b></p>
<p>Salaire Base: ${emp.salaireBase} FCFA</p>
<p>Total Reçu: ${emp.totalRecu} FCFA</p>
<p>Salaire Restant: ${emp.salaireRestant} FCFA</p>
<hr>
<b>Nos Coordonnées</b><br><br>
Adresse : 11 BP 2399, Abidjan, Côte d’Ivoire<br><br>
(+225) 27 21 724 177 | contact@etsganaousmanesarl.com
</div>
<br>
<button onclick="window.print()">🖨 Imprimer</button>
</body></html>
`);
fenetre.document.close();
}

// — Reçu thermique
function genererRecu(emp,type,montant){
let fenetre=window.open('','width=300,height=600');
fenetre.document.write(`
<html><body style="font-family:monospace;font-size:12px;">
<center><h3>GANA OUSMANE</h3>
11 BP 2399, Abidjan, Côte d’Ivoire<br>
(+225) 27 21 724 177 | contact@etsganaousmanesarl.com</center>
<hr>
Date: ${new Date().toLocaleString()}<br>
Employé: ${emp.nom}<br>
Type: ${type}<br>
Montant: ${montant} FCFA<br>
<hr>
Salaire Base: ${emp.salaireBase}<br>
Total Reçu: ${emp.totalRecu}<br>
Salaire Restant: ${emp.salaireRestant}<br>
<hr>
<center>Merci 🙏</center>
<button onclick="window.print()">🖨 Imprimer</button>
</body></html>
`);
fenetre.document.close();
}

// — PDF global
function exportPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text("Gestion - Gana Ousmane",20,20);
doc.save("Gestion_Operations.pdf");
}

// — INITIALISATION
afficherEmployes();

</script>
</body>
</html>
